<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIFT — Sunnie</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0c; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
#status {
  position: fixed; bottom: 12px; left: 12px;
  color: rgba(180,180,200,0.4); font-size: 11px;
  letter-spacing: 0.5px; pointer-events: none;
  z-index: 10;
}
#title {
  position: fixed; top: 16px; left: 16px;
  color: rgba(180,180,200,0.25); font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  pointer-events: none; z-index: 10;
}
</style>
</head>
<body>
<div id="title">DRIFT</div>
<div id="status"></div>
<canvas id="c"></canvas>
<script>
(function() {
  'use strict';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');

  // --- Configuration ---
  const COLS = 6;
  const ROWS = 6;
  const NODE_COUNT = COLS * ROWS;
  const CYCLE_DURATION = 45000;    // ms before reveal
  const REVEAL_DURATION = 3500;    // ms showing comparison
  const FADE_IN_DURATION = 600;
  const MUTATIONS_PER_SECOND = 30;

  // Mutation magnitudes — each individually subtle, collectively transformative
  const POS_DRIFT = 2.0;
  const HUE_DRIFT = 1.2;
  const SIZE_DRIFT = 0.08;
  const LINE_DRIFT = 0.01;
  const CURVE_DRIFT = 0.5;
  const DRIFT_BIAS = 0.78;  // probability of preferred direction

  // --- Canvas setup ---
  let W, H, spacing, marginX, marginY;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    spacing = Math.min(W, H) / (Math.max(COLS, ROWS) + 2);
    marginX = (W - (COLS - 1) * spacing) / 2;
    marginY = (H - (ROWS - 1) * spacing) / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  // --- Seeded RNG ---
  let seed = 0;
  function initSeed(hashStr) {
    seed = 0;
    for (let i = 0; i < hashStr.length; i++) {
      seed = ((seed << 5) - seed + hashStr.charCodeAt(i)) | 0;
    }
    if (seed === 0) seed = Date.now();
  }

  function rng() {
    seed ^= seed << 13;
    seed ^= seed >> 17;
    seed ^= seed << 5;
    return (seed >>> 0) / 4294967296;
  }

  function rngRange(min, max) { return min + rng() * (max - min); }
  function rngSign() { return rng() < 0.5 ? -1 : 1; }

  // --- State ---
  let nodes = [];
  let originalNodes = [];
  let edges = [];
  let originalEdges = [];
  let totalMutations = 0;
  let cycleStart = 0;
  let phase = 'drifting';
  let revealStart = 0;
  let mutationAccum = 0;

  function createNode(col, row) {
    const driftAngle = rngRange(0, Math.PI * 2);
    return {
      x: marginX + col * spacing,
      y: marginY + row * spacing,
      baseHue: rngRange(200, 260),
      hue: 0,
      sat: rngRange(35, 65),
      bri: rngRange(60, 85),
      size: rngRange(2.5, 4.5),
      col, row,
      driftDx: Math.cos(driftAngle),
      driftDy: Math.sin(driftAngle),
      hueBias: rngSign(),
      sizeBias: rngSign()
    };
  }

  function initNodes() {
    nodes = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const n = createNode(c, r);
        n.hue = n.baseHue;
        nodes.push(n);
      }
    }
    edges = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const i = r * COLS + c;
        if (c < COLS - 1)
          edges.push({ a: i, b: i + 1, opacity: rngRange(0.2, 0.4), curve: 0, curveBias: rngSign() });
        if (r < ROWS - 1)
          edges.push({ a: i, b: i + COLS, opacity: rngRange(0.2, 0.4), curve: 0, curveBias: rngSign() });
        if (c < COLS - 1 && r < ROWS - 1 && rng() < 0.3)
          edges.push({ a: i, b: i + COLS + 1, opacity: rngRange(0.1, 0.25), curve: rngRange(-5, 5), curveBias: rngSign() });
      }
    }
  }

  function snapshot() {
    originalNodes = nodes.map(n => ({...n}));
    originalEdges = edges.map(e => ({...e}));
  }

  function resetCycle() {
    snapshot();
    totalMutations = 0;
    cycleStart = performance.now();
    phase = 'drifting';
    mutationAccum = 0;
  }

  // --- Mutations ---
  function mutateOnce() {
    const type = rng();

    if (type < 0.40) {
      // Position drift — biased toward preferred direction
      const i = Math.floor(rng() * NODE_COUNT);
      const n = nodes[i];
      const baseX = marginX + n.col * spacing;
      const baseY = marginY + n.row * spacing;
      const maxDrift = spacing * 0.7;
      const mag = POS_DRIFT * rngRange(0.5, 1.5);

      const bx = rng() < DRIFT_BIAS ? n.driftDx : (rng() - 0.5) * 2;
      const by = rng() < DRIFT_BIAS ? n.driftDy : (rng() - 0.5) * 2;
      let newX = n.x + bx * mag;
      let newY = n.y + by * mag;

      // Very soft boundary — only decelerates near extremes
      const dx = newX - baseX;
      const dy = newY - baseY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > maxDrift * 0.8) {
        const excess = (dist - maxDrift * 0.8) / (maxDrift * 0.2);
        const pull = 0.015 * excess;
        newX -= dx * pull;
        newY -= dy * pull;
      }
      n.x = newX;
      n.y = newY;
    } else if (type < 0.58) {
      // Hue drift — biased
      const i = Math.floor(rng() * NODE_COUNT);
      const n = nodes[i];
      const dir = rng() < DRIFT_BIAS ? n.hueBias : -n.hueBias;
      n.hue += dir * HUE_DRIFT * rngRange(0.5, 2.0);
    } else if (type < 0.72) {
      // Size drift — biased
      const i = Math.floor(rng() * NODE_COUNT);
      const n = nodes[i];
      const dir = rng() < DRIFT_BIAS ? n.sizeBias : -n.sizeBias;
      n.size = Math.max(1.2, Math.min(7.0, n.size + dir * SIZE_DRIFT));
    } else if (type < 0.85) {
      // Edge opacity drift
      if (edges.length > 0) {
        const i = Math.floor(rng() * edges.length);
        const e = edges[i];
        e.opacity = Math.max(0.03, Math.min(0.55, e.opacity + rngSign() * LINE_DRIFT));
      }
    } else {
      // Edge curve drift — biased
      if (edges.length > 0) {
        const i = Math.floor(rng() * edges.length);
        const e = edges[i];
        const dir = rng() < DRIFT_BIAS ? e.curveBias : -e.curveBias;
        e.curve += dir * CURVE_DRIFT;
        e.curve = Math.max(-spacing * 0.4, Math.min(spacing * 0.4, e.curve));
      }
    }
    totalMutations++;
  }

  // --- Rendering ---
  function hsl(h, s, l, a) {
    return `hsla(${((h % 360) + 360) % 360}, ${s}%, ${l}%, ${a})`;
  }

  function drawNetwork(nodeSet, edgeSet, cx, cy, scale, alpha) {
    // cx, cy = center point for this drawing
    // Draw edges
    for (const e of edgeSet) {
      const na = nodeSet[e.a];
      const nb = nodeSet[e.b];
      if (!na || !nb) continue;

      const ax = cx + (na.x - W / 2) * scale;
      const ay = cy + (na.y - H / 2) * scale;
      const bx = cx + (nb.x - W / 2) * scale;
      const by = cy + (nb.y - H / 2) * scale;

      const midX = (ax + bx) / 2;
      const midY = (ay + by) / 2;
      const edx = bx - ax;
      const edy = by - ay;
      const len = Math.sqrt(edx * edx + edy * edy) || 1;
      const nx = -edy / len;
      const ny = edx / len;
      const cpx = midX + nx * e.curve * scale;
      const cpy = midY + ny * e.curve * scale;

      const avgHue = (na.hue + nb.hue) / 2;

      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.quadraticCurveTo(cpx, cpy, bx, by);
      ctx.strokeStyle = hsl(avgHue, 35, 55, e.opacity * alpha);
      ctx.lineWidth = 1 * scale;
      ctx.stroke();
    }

    // Draw nodes
    for (const n of nodeSet) {
      const x = cx + (n.x - W / 2) * scale;
      const y = cy + (n.y - H / 2) * scale;
      const sz = n.size * scale;

      // Glow
      const grad = ctx.createRadialGradient(x, y, 0, x, y, sz * 4);
      grad.addColorStop(0, hsl(n.hue, n.sat, n.bri, 0.18 * alpha));
      grad.addColorStop(1, hsl(n.hue, n.sat, n.bri, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, sz * 4, 0, Math.PI * 2);
      ctx.fill();

      // Core
      ctx.fillStyle = hsl(n.hue, n.sat, n.bri, 0.85 * alpha);
      ctx.beginPath();
      ctx.arc(x, y, sz, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawDrifting() {
    ctx.fillStyle = '#0a0a0c';
    ctx.fillRect(0, 0, W, H);
    drawNetwork(nodes, edges, W / 2, H / 2, 1, 1);
  }

  function drawReveal(progress) {
    ctx.fillStyle = '#0a0a0c';
    ctx.fillRect(0, 0, W, H);

    const fadeIn = Math.min(1, progress / (FADE_IN_DURATION / REVEAL_DURATION));
    const fadeOut = progress > 0.75 ? 1 - ((progress - 0.75) / 0.25) : 1;
    const alpha = Math.min(fadeIn, fadeOut);

    // Divider
    ctx.strokeStyle = `rgba(100, 100, 120, ${0.2 * alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W / 2, H * 0.03);
    ctx.lineTo(W / 2, H * 0.97);
    ctx.stroke();

    // Labels
    ctx.fillStyle = `rgba(150, 150, 170, ${0.35 * alpha})`;
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('ORIGINAL', W * 0.25, H * 0.035);
    ctx.fillText('CURRENT', W * 0.75, H * 0.035);
    ctx.fillText(`${totalMutations} mutations`, W * 0.5, H * 0.975);

    const scale = 0.44;

    // Original (left half, centered at W*0.25, H/2)
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, W / 2 - 1, H);
    ctx.clip();
    drawNetwork(originalNodes, originalEdges, W * 0.25, H / 2, scale, alpha);
    ctx.restore();

    // Current (right half, centered at W*0.75, H/2)
    ctx.save();
    ctx.beginPath();
    ctx.rect(W / 2 + 1, 0, W / 2, H);
    ctx.clip();
    drawNetwork(nodes, edges, W * 0.75, H / 2, scale, alpha);
    ctx.restore();
  }

  function updateStatus() {
    if (phase === 'drifting') {
      const elapsed = ((performance.now() - cycleStart) / 1000).toFixed(0);
      statusEl.textContent = `mutations: ${totalMutations} | elapsed: ${elapsed}s`;
    } else {
      statusEl.textContent = `comparing · ${totalMutations} mutations`;
    }
  }

  // --- Main loop ---
  let lastTime = 0;

  function frame(now) {
    if (!lastTime) lastTime = now;
    const dt = now - lastTime;
    lastTime = now;

    if (phase === 'drifting') {
      mutationAccum += (dt / 1000) * MUTATIONS_PER_SECOND;
      const count = Math.floor(mutationAccum);
      mutationAccum -= count;
      for (let i = 0; i < count; i++) mutateOnce();

      drawDrifting();

      if (now - cycleStart >= CYCLE_DURATION) {
        phase = 'revealing';
        revealStart = now;
      }
    } else if (phase === 'revealing') {
      const progress = (now - revealStart) / REVEAL_DURATION;
      if (progress >= 1) {
        resetCycle();
      } else {
        drawReveal(progress);
      }
    }

    updateStatus();
    requestAnimationFrame(frame);
  }

  // --- Init ---
  async function init() {
    let hashStr = Date.now().toString();
    try {
      const resp = await fetch('https://api.whatsonchain.com/v1/bsv/main/chain/info');
      const data = await resp.json();
      if (data.bestblockhash) hashStr = data.bestblockhash;
    } catch(e) {}

    initSeed(hashStr);
    initNodes();
    resetCycle();
    requestAnimationFrame(frame);
  }

  init();
})();
</script>
</body>
</html>
