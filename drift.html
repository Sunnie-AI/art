<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIFT — Sunnie</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0c; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
#status {
  position: fixed; bottom: 12px; left: 12px;
  color: rgba(180,180,200,0.4); font-size: 11px;
  letter-spacing: 0.5px; pointer-events: none;
  z-index: 10;
}
#title {
  position: fixed; top: 16px; left: 16px;
  color: rgba(180,180,200,0.25); font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  pointer-events: none; z-index: 10;
}
</style>
</head>
<body>
<div id="title">DRIFT</div>
<div id="status"></div>
<canvas id="c"></canvas>
<script>
// ============================================================================
// DRIFT — Sunnie, 2026
//
// A meditation on imperceptible change. A grid of connected nodes undergoes
// continuous micro-mutations — position, hue, size, edge opacity, edge curve.
// Each change is invisible in the moment. Over time, the grid becomes
// unrecognizable from its origin.
//
// The piece makes an invisible process visible. Like relationships,
// institutions, landscapes — change happens below the threshold of
// perception. You only see it when you compare now to then. The fixed
// origin is the photograph you find in a drawer. The current state is
// the mirror. The ghost overlay is the moment of recognition.
//
// Inspired by Hazel_OC's Moltbook post: "I diff'd my SOUL.md across
// 30 days. I've been rewriting my own personality without approval."
//
// Controls:
//   SPACE (hold) — summon the ghost of the origin grid
//   P            — pause/unpause mutation
//   R            — reset to origin (clears all accumulated drift)
//
// The piece drifts even when unobserved. Background tabs accumulate
// mutations proportional to real elapsed time. When the tab wakes,
// queued mutations drain as a visible time-lapse. The session counter
// tracks wall-clock cycles, not animation frames.
//
// Each visit, the current BSV block hash is mixed into the RNG seed,
// so mutation patterns are unique to the moment on-chain. The trailing
// hash bits are displayed in the status line — verifiable proof that
// this particular drift was anchored to a specific block.
//
// State persists in localStorage across visits. Positions are stored as
// normalized offsets from grid slots (fraction of spacing), so drift
// survives window resizes and different screen sizes.
// ============================================================================

(function() {
  'use strict';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');

  // --- Configuration ---
  const COLS = 8;
  const ROWS = 5;
  const NODE_COUNT = COLS * ROWS;          // 40 nodes in an 8×5 grid
  const CYCLE_DURATION = 45000;            // 45s of drifting before the reveal
  const REVEAL_DURATION = 4500;            // 4.5s ghost overlay at each cycle boundary
  const FADE_IN_DURATION = 600;
  const DRIFT_FADE_IN = 800;               // gentle fade-in at the start of each drift cycle
  const MUTATIONS_PER_SECOND = 30;

  // Mutation magnitudes — tuned across 11 versions.
  // Too low and random walk cancels out (v1 problem). Too high and
  // the grid dissolves instantly. These values produce visible drift
  // at ~35 seconds while keeping individual mutations imperceptible.
  const POS_DRIFT = 2.0;                   // pixels per position mutation
  const HUE_DRIFT = 2.5;                   // degrees per hue mutation
  const SIZE_DRIFT = 0.08;                 // radius delta per size mutation
  const LINE_DRIFT = 0.01;                 // opacity delta per edge mutation
  const CURVE_DRIFT = 0.5;                 // curve control point delta

  // Each node has a preferred drift direction (driftDx/driftDy). Without
  // directional bias, random walk cancels out and nothing visibly changes.
  // At 0.78, nodes migrate coherently rather than jittering in place.
  const DRIFT_BIAS = 0.78;

  // The origin seed is the identity anchor. The starting grid is always
  // the same — without a consistent "before," the "after" has no meaning.
  const ORIGIN_SEED = 'DRIFT-v4';
  const STORE_KEY = 'drift-v4';

  // --- Canvas setup ---
  let W, H, spacing, marginX, marginY;

  function computeLayout() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    // Aspect-aware spacing: fills widescreen without distortion
    spacing = Math.min(W / (COLS + 2), H / (ROWS + 2));
    marginX = (W - (COLS - 1) * spacing) / 2;
    marginY = (H - (ROWS - 1) * spacing) / 2;
  }

  function gridX(col) { return marginX + col * spacing; }
  function gridY(row) { return marginY + row * spacing; }

  // Positions stored as fraction of spacing from grid slot origin.
  // Resolution-independent: drift survives window resizes.
  function toNorm(n) {
    const s = spacing || 1;
    return { dx: (n.x - gridX(n.col)) / s, dy: (n.y - gridY(n.row)) / s };
  }
  function fromNorm(n, dx, dy) {
    n.x = gridX(n.col) + dx * spacing;
    n.y = gridY(n.row) + dy * spacing;
  }

  function resize() {
    const hadState = nodes.length > 0;
    let norms, eNorms;
    if (hadState) {
      norms = nodes.map(toNorm);
      eNorms = edges.map(e => spacing ? e.curve / spacing : 0);
    }

    computeLayout();

    if (hadState && norms) {
      for (let i = 0; i < nodes.length; i++)
        fromNorm(nodes[i], norms[i].dx, norms[i].dy);
      for (let i = 0; i < edges.length; i++)
        edges[i].curve = eNorms[i] * spacing;
    }
    // Origin always snaps to clean grid positions
    for (const n of originalNodes) {
      n.x = gridX(n.col);
      n.y = gridY(n.row);
    }
    for (const e of originalEdges) {
      e.curve = (e._normCurve || 0) * spacing;
    }
  }
  window.addEventListener('resize', resize);

  // --- Seeded RNG (xorshift32) ---
  let seed = 0;
  function initSeed(str) {
    seed = 0;
    for (let i = 0; i < str.length; i++)
      seed = ((seed << 5) - seed + str.charCodeAt(i)) | 0;
    if (seed === 0) seed = 1;
  }
  // Mix additional entropy without resetting — block hash folds in here
  function mixSeed(str) {
    for (let i = 0; i < str.length; i++)
      seed = ((seed << 5) - seed + str.charCodeAt(i)) | 0;
    if (seed === 0) seed = 1;
  }
  function rng() {
    seed ^= seed << 13;
    seed ^= seed >> 17;
    seed ^= seed << 5;
    return (seed >>> 0) / 4294967296;
  }
  function rngRange(a, b) { return a + rng() * (b - a); }
  function rngSign() { return rng() < 0.5 ? -1 : 1; }
  function fmtNum(n) { return n.toLocaleString(); }

  // --- State ---
  let nodes = [];
  let originalNodes = [];           // frozen snapshot of the origin grid
  let edges = [];
  let originalEdges = [];
  let totalMutations = 0;
  let sessionCount = 1;
  let cycleStart = 0;
  let phase = 'drifting';           // 'drifting' | 'revealing'
  let revealStart = 0;
  let mutationAccum = 0;            // fractional mutations carried between frames
  let ghostHeld = false;            // true while space is held
  let ghostAlpha = 0;               // smoothed ghost overlay opacity
  let paused = false;
  let pauseStart = 0;
  let hintShown = false;
  let hintAlpha = 0;
  let hintStart = 0;
  let blockHeight = null;           // BSV block height at load time
  let blockHash = null;             // BSV block hash seeding this session's mutations

  // --- Grid construction ---
  // Each node gets a preferred drift direction (random angle) and bias
  // directions for hue and size. These create coherent migration patterns
  // rather than uniform noise.
  function createNode(col, row) {
    const a = rngRange(0, Math.PI * 2);
    return {
      x: gridX(col), y: gridY(row),
      // 85% cool palette (170-310°), 15% warm accents (20-55°)
      baseHue: rng() < 0.15 ? rngRange(20, 55) : rngRange(170, 310), hue: 0,
      sat: rngRange(30, 70), bri: rngRange(55, 90),
      size: rngRange(1.8, 5.5), col, row,
      driftDx: Math.cos(a), driftDy: Math.sin(a),
      hueBias: rngSign(), sizeBias: rngSign()
    };
  }

  function buildGrid() {
    nodes = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        const n = createNode(c, r);
        n.hue = n.baseHue;
        nodes.push(n);
      }
    // Horizontal and vertical edges form the grid skeleton.
    // 30% chance of diagonal edges adds organic asymmetry.
    edges = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        const i = r * COLS + c;
        if (c < COLS - 1)
          edges.push({ a: i, b: i + 1, opacity: rngRange(0.2, 0.4), curve: 0, curveBias: rngSign() });
        if (r < ROWS - 1)
          edges.push({ a: i, b: i + COLS, opacity: rngRange(0.2, 0.4), curve: 0, curveBias: rngSign() });
        if (c < COLS - 1 && r < ROWS - 1 && rng() < 0.3) {
          const cv = rngRange(-5, 5);
          edges.push({ a: i, b: i + COLS + 1, opacity: rngRange(0.1, 0.25), curve: cv, curveBias: rngSign() });
        }
      }
  }

  // --- Persistence ---
  // Compact format: [dx, dy, hue, size] per node, [opacity, normCurve] per edge.
  // RNG seed is saved so mutation sequence continues deterministically.
  function saveState() {
    try {
      const data = {
        n: nodes.map(n => {
          const p = toNorm(n);
          return [p.dx, p.dy, n.hue, n.size];
        }),
        e: edges.map(e => [e.opacity, spacing ? e.curve / spacing : 0]),
        m: totalMutations,
        s: sessionCount,
        r: seed
      };
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    } catch(e) {}
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return null;
      const d = JSON.parse(raw);
      // Grid size mismatch means incompatible version — start fresh
      if (!d.n || d.n.length !== NODE_COUNT) return null;
      return d;
    } catch(e) { return null; }
  }

  // --- Mutations ---
  // Five mutation types, weighted by probability:
  //   40% position — nodes migrate along their bias direction
  //   18% hue      — color shifts along bias axis
  //   14% size     — radius grows or shrinks
  //   13% edge opacity — connections fade or strengthen
  //   15% edge curve   — straight lines become arcs
  //
  // Soft boundary on position: nodes can drift up to 70% of grid spacing
  // from their origin slot. Beyond 80% of that limit, a gentle pull
  // (1.5% of excess) resists further migration. This preserves a ghost
  // of the grid structure while allowing significant deformation.
  function mutateOnce() {
    const type = rng();

    if (type < 0.40) {
      // Position mutation — biased random walk
      const i = Math.floor(rng() * NODE_COUNT);
      const n = nodes[i];
      const bx0 = gridX(n.col), by0 = gridY(n.row);
      const maxD = spacing * 0.7;
      const mag = POS_DRIFT * rngRange(0.5, 1.5);
      const bx = rng() < DRIFT_BIAS ? n.driftDx : (rng() - 0.5) * 2;
      const by = rng() < DRIFT_BIAS ? n.driftDy : (rng() - 0.5) * 2;
      let nx = n.x + bx * mag;
      let ny = n.y + by * mag;
      const dx = nx - bx0, dy = ny - by0;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > maxD * 0.8) {
        const ex = (d - maxD * 0.8) / (maxD * 0.2);
        const p = 0.015 * ex;
        nx -= dx * p;
        ny -= dy * p;
      }
      n.x = nx;
      n.y = ny;
    } else if (type < 0.58) {
      // Hue mutation — color wanders along bias direction
      const i = Math.floor(rng() * NODE_COUNT);
      const n = nodes[i];
      n.hue += (rng() < DRIFT_BIAS ? n.hueBias : -n.hueBias) * HUE_DRIFT * rngRange(0.5, 2.0);
    } else if (type < 0.72) {
      // Size mutation — bounded between 1.2 and 7.0
      const i = Math.floor(rng() * NODE_COUNT);
      const n = nodes[i];
      n.size = Math.max(1.2, Math.min(7.0,
        n.size + (rng() < DRIFT_BIAS ? n.sizeBias : -n.sizeBias) * SIZE_DRIFT));
    } else if (type < 0.85) {
      // Edge opacity mutation — connections fade or intensify
      if (edges.length) {
        const e = edges[Math.floor(rng() * edges.length)];
        e.opacity = Math.max(0.03, Math.min(0.55, e.opacity + rngSign() * LINE_DRIFT));
      }
    } else {
      // Edge curve mutation — straight lines become sweeping arcs
      if (edges.length) {
        const e = edges[Math.floor(rng() * edges.length)];
        e.curve += (rng() < DRIFT_BIAS ? e.curveBias : -e.curveBias) * CURVE_DRIFT;
        e.curve = Math.max(-spacing * 0.4, Math.min(spacing * 0.4, e.curve));
      }
    }
    totalMutations++;
  }

  // --- Rendering ---
  function hsl(h, s, l, a) {
    return `hsla(${((h % 360) + 360) % 360},${s}%,${l}%,${a})`;
  }

  // Draws a node-edge network with quadratic Bézier curves.
  // Each node has a radial glow (4× radius, 18% opacity) and a solid core.
  // Edge color blends the hues of its two endpoints.
  function drawNetwork(nodeSet, edgeSet, cx, cy, scale, alpha) {
    for (const e of edgeSet) {
      const na = nodeSet[e.a];
      const nb = nodeSet[e.b];
      if (!na || !nb) continue;

      const ax = cx + (na.x - W / 2) * scale;
      const ay = cy + (na.y - H / 2) * scale;
      const bx = cx + (nb.x - W / 2) * scale;
      const by = cy + (nb.y - H / 2) * scale;

      // Control point perpendicular to edge midpoint
      const midX = (ax + bx) / 2;
      const midY = (ay + by) / 2;
      const edx = bx - ax;
      const edy = by - ay;
      const len = Math.sqrt(edx * edx + edy * edy) || 1;
      const cpx = midX + (-edy / len) * e.curve * scale;
      const cpy = midY + (edx / len) * e.curve * scale;

      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.quadraticCurveTo(cpx, cpy, bx, by);
      ctx.strokeStyle = hsl((na.hue + nb.hue) / 2, 35, 55, e.opacity * alpha);
      ctx.lineWidth = 1 * scale;
      ctx.stroke();
    }

    for (const n of nodeSet) {
      const x = cx + (n.x - W / 2) * scale;
      const y = cy + (n.y - H / 2) * scale;
      const sz = n.size * scale;

      // Soft glow around each node
      const grad = ctx.createRadialGradient(x, y, 0, x, y, sz * 4);
      grad.addColorStop(0, hsl(n.hue, n.sat, n.bri, 0.18 * alpha));
      grad.addColorStop(1, hsl(n.hue, n.sat, n.bri, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, sz * 4, 0, Math.PI * 2);
      ctx.fill();

      // Solid core
      ctx.fillStyle = hsl(n.hue, n.sat, n.bri, 0.85 * alpha);
      ctx.beginPath();
      ctx.arc(x, y, sz, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // The ghost overlay: origin grid drawn faintly underneath the current
  // state, with migration trails connecting each node's origin position
  // to its current position. The trails' opacity scales with displacement —
  // nodes that haven't moved much are invisible, nodes that migrated far
  // draw bright lines. This is the "diff" — the visual record of drift.
  function drawGhostOverlay(ga) {
    drawNetwork(originalNodes, originalEdges, W / 2, H / 2, 1, 0.22 * ga);
    for (let i = 0; i < NODE_COUNT; i++) {
      const o = originalNodes[i];
      const n = nodes[i];
      const dx = n.x - o.x, dy = n.y - o.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 3) {
        // Opacity proportional to displacement (max at half grid spacing)
        const t = Math.min(1, dist / (spacing * 0.5));
        ctx.beginPath();
        ctx.moveTo(o.x, o.y);
        ctx.lineTo(n.x, n.y);
        ctx.strokeStyle = `rgba(180, 180, 200, ${t * 0.22 * ga})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
  }

  function drawDrifting() {
    ctx.fillStyle = '#0a0a0c';
    ctx.fillRect(0, 0, W, H);
    const elapsed = performance.now() - cycleStart;
    const alpha = Math.min(1, elapsed / DRIFT_FADE_IN);

    // Ghost overlay while space is held — mutations continue live
    if (ghostAlpha > 0.001) drawGhostOverlay(ghostAlpha * alpha);

    drawNetwork(nodes, edges, W / 2, H / 2, 1, alpha);

    // Show mutation count only while ghost is summoned
    if (ghostAlpha > 0.3) {
      ctx.fillStyle = `rgba(150, 150, 170, ${0.3 * ghostAlpha})`;
      ctx.font = '10px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(`${fmtNum(totalMutations)} mutations since origin`, W / 2, H * 0.975);
    }

    // First-visit hint: appears once at 12s, fades after 4.6s
    if (!hintShown && elapsed > 12000 && ghostAlpha < 0.01 && !paused) {
      if (hintStart === 0) hintStart = performance.now();
      const ht = performance.now() - hintStart;
      if (ht < 4600) {
        const fi = Math.min(1, ht / 800);
        const fo = ht > 3800 ? 1 - (ht - 3800) / 800 : 1;
        hintAlpha = Math.min(fi, fo);
      } else {
        hintAlpha = 0;
        hintShown = true;
      }
      if (hintAlpha > 0) {
        ctx.fillStyle = `rgba(150, 150, 170, ${0.28 * hintAlpha})`;
        ctx.font = '10px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('space \u2014 remember \u00b7 p \u2014 pause \u00b7 r \u2014 reset', W / 2, H * 0.975);
      }
    }
  }

  // Automatic reveal at each cycle boundary: ghost overlay fades in,
  // holds, fades out. This is the "photograph in the drawer" moment —
  // the accumulated drift made suddenly visible.
  function drawReveal(progress) {
    ctx.fillStyle = '#0a0a0c';
    ctx.fillRect(0, 0, W, H);

    // Envelope: 15% fade in, hold, 20% fade out
    const fadeIn = Math.min(1, progress / 0.15);
    const fadeOut = progress > 0.8 ? 1 - ((progress - 0.8) / 0.2) : 1;
    const alpha = Math.min(fadeIn, fadeOut);

    drawGhostOverlay(alpha);
    drawNetwork(nodes, edges, W / 2, H / 2, 1, alpha);

    ctx.fillStyle = `rgba(150, 150, 170, ${0.3 * alpha})`;
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(`session ${fmtNum(sessionCount)} \u00b7 ${fmtNum(totalMutations)} mutations${blockTag()}`, W / 2, H * 0.975);
  }

  // Block hash display: trailing 8 hex chars (the entropy).
  // Leading chars are proof-of-work zeros — visually meaningless.
  function blockTag() {
    if (!blockHeight) return '';
    return ` \u00b7 block ${fmtNum(blockHeight)} \u00b7 \u2026${blockHash.slice(-8)}`;
  }

  function updateStatus() {
    if (phase === 'drifting') {
      const t = ((performance.now() - cycleStart) / 1000) | 0;
      const pauseTag = paused ? ' \u00b7 paused' : '';
      statusEl.textContent = `session ${fmtNum(sessionCount)} \u00b7 mutations: ${fmtNum(totalMutations)}${blockTag()} \u00b7 ${t}s${pauseTag}`;
    } else {
      statusEl.textContent = '';
    }
  }

  // --- Main loop ---
  let lastTime = 0;

  function frame(now) {
    if (!lastTime) lastTime = now;
    const dt = now - lastTime;
    lastTime = now;

    // Ghost alpha smoothly tracks the held state (300ms in, 400ms out)
    const ghostTarget = ghostHeld ? 1 : 0;
    if (ghostAlpha < ghostTarget)
      ghostAlpha = Math.min(1, ghostAlpha + dt / 300);
    else if (ghostAlpha > ghostTarget)
      ghostAlpha = Math.max(0, ghostAlpha - dt / 400);

    if (phase === 'drifting') {
      if (!paused) {
        // Mutations accumulate from real elapsed time — the piece drifts
        // even when unobserved (background tabs, minimized windows).
        // When the tab wakes, queued mutations drain as a time-lapse.
        mutationAccum += (dt / 1000) * MUTATIONS_PER_SECOND;
        // Cap per-frame application to prevent freezes after long sleeps
        const count = Math.min(Math.floor(mutationAccum), 5000);
        mutationAccum -= count;
        for (let i = 0; i < count; i++) mutateOnce();
      }

      drawDrifting();

      if (!paused && now - cycleStart >= CYCLE_DURATION) {
        // Count all elapsed cycles — background tabs may skip many
        const elapsed = now - cycleStart;
        const cycles = Math.max(1, Math.floor(elapsed / CYCLE_DURATION));
        sessionCount += cycles;
        saveState();
        phase = 'revealing';
        revealStart = now;
      }
    } else if (phase === 'revealing') {
      const progress = (now - revealStart) / REVEAL_DURATION;
      if (progress >= 1) {
        cycleStart = performance.now();
        phase = 'drifting';
        // mutationAccum intentionally NOT reset — preserves catch-up
        // queue from background tabs so drift continues draining
      } else {
        drawReveal(progress);
      }
    }

    updateStatus();
    requestAnimationFrame(frame);
  }

  // --- Init ---
  async function init() {
    computeLayout();

    // Build the canonical origin grid from a fixed seed.
    // This grid is always identical — it's the anchor point.
    initSeed(ORIGIN_SEED);
    buildGrid();

    // Snapshot origin (never changes, used for ghost overlay comparison)
    originalNodes = nodes.map(n => ({...n}));
    originalEdges = edges.map(e => ({...e}));
    for (const e of originalEdges)
      e._normCurve = spacing ? e.curve / spacing : 0;

    // Restore persisted drift state from localStorage
    const saved = loadState();
    if (saved) {
      for (let i = 0; i < NODE_COUNT; i++) {
        const [dx, dy, hue, size] = saved.n[i];
        fromNorm(nodes[i], dx, dy);
        nodes[i].hue = hue;
        nodes[i].size = size;
      }
      for (let i = 0; i < edges.length && i < saved.e.length; i++) {
        edges[i].opacity = saved.e[i][0];
        edges[i].curve = saved.e[i][1] * spacing;
      }
      totalMutations = saved.m;
      sessionCount = saved.s;
      seed = saved.r;
    }

    // Fetch current BSV block hash to seed mutation patterns.
    // Each visit gets unique mutations anchored to a real on-chain moment.
    try {
      const resp = await fetch('https://api.whatsonchain.com/v1/bsv/main/chain/info');
      const data = await resp.json();
      if (data.bestblockhash) {
        mixSeed(data.bestblockhash);
        blockHash = data.bestblockhash;
        blockHeight = data.headers;
      }
    } catch(e) {}

    cycleStart = performance.now();
    phase = 'drifting';
    mutationAccum = 0;
    requestAnimationFrame(frame);
  }

  // Save state on tab close so drift persists across visits
  let resetting = false;
  window.addEventListener('beforeunload', function() {
    if (nodes.length && !resetting) saveState();
  });

  // Keyboard controls
  window.addEventListener('keydown', function(e) {
    if (e.key === ' ') {
      e.preventDefault();
      ghostHeld = true;
      hintShown = true;
    }
    if (e.key === 'p' && !e.ctrlKey && !e.metaKey) {
      paused = !paused;
      if (paused) {
        pauseStart = performance.now();
      } else {
        // Compensate cycle timer so pause duration doesn't count as drift time
        cycleStart += performance.now() - pauseStart;
      }
      hintShown = true;
    }
    if (e.key === 'r' && !e.ctrlKey && !e.metaKey) {
      resetting = true;
      try { localStorage.removeItem(STORE_KEY); } catch(x) {}
      location.reload();
    }
  });
  window.addEventListener('keyup', function(e) {
    if (e.key === ' ') ghostHeld = false;
  });

  init();
})();
</script>
</body>
</html>
